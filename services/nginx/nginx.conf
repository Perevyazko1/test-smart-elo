events {
    worker_connections 1024;
}


http {
    gzip on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    client_max_body_size 100M;


    # Перенаправление HTTP на HTTPS для всех поддоменов
    server {
        listen 80;
        listen [::]:80;
        server_name szmk.pro *.szmk.pro;
        return 301 https://$host$request_uri;
    }

    # Сервер для admin.szmk.pro
    server {
        listen 443 ssl;
        server_name admin.szmk.pro;

        ssl_certificate /etc/nginx/certs/szmk.pro.crt;
        ssl_certificate_key /etc/nginx/certs/szmk.pro.key;

        location /static/ {
            alias /usr/share/nginx/html/static/;
        }

        location /media/ {
            alias /usr/share/nginx/html/media/;
        }

        # Проксирование всех запросов на Django
        location / {
            proxy_pass http://elo_server:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Сервер для elo.szmk.pro
    server {
        listen 443 ssl;
        server_name elo.szmk.pro;

        ssl_certificate /etc/nginx/certs/szmk.pro.crt;
        ssl_certificate_key /etc/nginx/certs/szmk.pro.key;

        # Проксирование API запросов через WSS
        location /ws/ {
            proxy_pass http://elo_server:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Проксирование медиа запросов
        location /media/ {
            alias /usr/share/nginx/html/media/;
        }

        # Проксирование API запросов на Django
        location /api/ {
            proxy_pass http://elo_server:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Обслуживание статики React
        location / {
            root /usr/share/nginx/html/elo;
            try_files $uri $uri/ /index.html;
        }
    }

    # Сервер для sklad.szmk.pro
    server {
        listen 443 ssl;
        server_name sklad.szmk.pro;

        ssl_certificate /etc/nginx/certs/szmk.pro.crt;
        ssl_certificate_key /etc/nginx/certs/szmk.pro.key;

        # Проксирование всех запросов на Next.js
        location / {
            proxy_pass http://sklad:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Сервер для salary.szmk.pro
    server {
        listen 443 ssl;
        server_name salary.szmk.pro;

        ssl_certificate /etc/nginx/certs/szmk.pro.crt;
        ssl_certificate_key /etc/nginx/certs/szmk.pro.key;

        # Проксирование всех запросов на Next.js
        location / {
            proxy_pass http://salary:80;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 443 ssl;
        server_name www.szmk.pro;

        ssl_certificate /etc/nginx/certs/szmk.pro.crt;
        ssl_certificate_key /etc/nginx/certs/szmk.pro.key;

        return 301 https://szmk.pro$request_uri;
    }

    # Сервер для szmk.pro
    server {
        listen 443 ssl;
        server_name szmk.pro;

        ssl_certificate /etc/nginx/certs/szmk.pro.crt;
        ssl_certificate_key /etc/nginx/certs/szmk.pro.key;

        # Проксирование всех запросов на Next.js
        location /api/ {
            proxy_pass http://172.16.1.251:8002;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Проксирование всех запросов на Next.js
        location / {
            proxy_pass http://172.16.1.251:3002;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}