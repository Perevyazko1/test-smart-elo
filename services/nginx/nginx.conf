events {
    worker_connections 1024;
}

http {
    gzip on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    client_max_body_size 100M;

    server {
        listen 80;
        listen [::]:80;

        server_name elo.szmk.pro;

        # Редирект с HTTP на HTTPS
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name elo.szmk.pro;

        ssl_certificate /etc/nginx/ssl/elo.szmk.pro.crt;
        ssl_certificate_key /etc/nginx/ssl/elo.szmk.pro.key;

        ssl_protocols TLSv1.2;
        ssl_prefer_server_ciphers on;
        ssl_ciphers "EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH";

        root /usr/share/nginx/html;
        index index.html;

        location /media {
            alias /usr/share/nginx/html/media;
        }

        # Проксирование API запросов через HTTPS
        location /api/ {
            proxy_pass http://172.16.1.212:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "keep-alive";
            proxy_buffering off;
        }

        # Проксирование API запросов через WSS
        location /ws/ {
            proxy_pass http://172.16.1.212:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
