version: "3.8"

services:
  postgres_db:
    build: ./postgres_db
    container_name: postgres_db_eq
    restart: always
    expose:
      - "5432"
    volumes:
      - db:/var/lib/postgresql/data
    env_file:
      - .env

  django_app:
    build:
      context: ./django_app
      dockerfile: Dockerfile
    container_name: django_app_eq
    restart: always
    depends_on:
      - redis
      - postgres_db
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - media:/app/media
    command: >
      sh -c "python3 manage.py makemigrations &&
             python3 manage.py migrate &&
             python3 manage.py runserver 0.0.0.0:8000"

  pgadmin:
    build:
      context: ./pgadmin
      dockerfile: Dockerfile
    container_name: pgadmin_eq
    restart: always
    depends_on:
      - postgres_db
    ports:
      - "5050:80"
    env_file:
      - ./.env
    volumes:
      - ./pgadmin/PGADMINDATA:/var/lib/pgadmin

  redis:
    container_name: redis_eq
    build: ./redis
    ports:
      - "6379:6379"
    restart: always

  nginx:
    container_name: nginx_eq
    build: ./nginx
    restart: always
    depends_on:
      - django_app
    volumes:
      - ./react_app/build/:/usr/share/nginx/html
      - media:/usr/share/nginx/html/media
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
    env_file:
      - ./.env

  celery_worker:
    build:
      context: ./django_app
      dockerfile: Dockerfile
    container_name: celery_worker_eq
    restart: always
    volumes:
      - media:/app/media
    depends_on:
      - django_app
      - postgres_db
    ports:
      - "58231"
    command: celery -A django_app worker -l info
    env_file:
      - .env

  celery_beat:
    build:
      context: ./django_app
      dockerfile: Dockerfile
    container_name: celery_beat_eq
    restart: always
    depends_on:
      - django_app
      - postgres_db
    volumes:
      - media:/app/media
    ports:
      - "58232"
    command: celery -A django_app beat -l INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env

volumes:
  db:
    driver: local
  media:
    driver: local
