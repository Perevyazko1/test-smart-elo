version: "3.8"

services:
  nginx:
    build:
      context: ./services/nginx
      dockerfile: Dockerfile
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./django_app/media/:/usr/share/nginx/html/media
      - ./django_app/static/:/usr/share/nginx/html/static
      - ./services/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./services/nginx/certs:/etc/nginx/certs
      - react_build:/usr/share/nginx/html/elo
    depends_on:
      - elo_server
      - sklad
      - elo_client_build
    networks:
      - app-network
    restart: always

  elo_server:
    build:
      context: ./django_app
      dockerfile: Dockerfile
    container_name: elo_server
    volumes:
      - ./django_app/media/:/app/media
    env_file:
      - .env.docker.prod
    restart: always
    expose:
      - "8000"
    networks:
      - app-network
    depends_on:
      - elo_redis
      - postgres
    command: >
      sh -c "uvicorn django_app.asgi:application --host 0.0.0.0 --port 8000"

  elo_redis:
    container_name: elo_redis
    build: ./services/redis
    ports:
      - "6379"
    restart: always
    networks:
      - app-network

  elo_celery_worker:
    build:
      context: ./django_app
      dockerfile: Dockerfile
    container_name: elo_celery_worker
    restart: always
    volumes:
      - ./django_app/media/:/app/media
    depends_on:
      - elo_server
    ports:
      - "58231"
    command: celery -A django_app worker -l info
    env_file:
      - .env.docker.prod
    networks:
      - app-network

  elo_celery_beat:
    build:
      context: ./django_app
      dockerfile: Dockerfile
    container_name: elo_celery_beat
    restart: always
    depends_on:
      - elo_server
    volumes:
      - ./django_app/media/:/app/media
    ports:
      - "58232"
    command: celery -A django_app beat -l INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env.docker.prod
    networks:
      - app-network

  elo_client_build:
      build:
        context: ./new_react
        dockerfile: Dockerfile
      container_name: elo_client_build
      stdin_open: true
      tty: true
      volumes:
        - react_build:/output
      command: sh -c "cp -r /runtime/build/* /output/ && ls -la /output"

  sklad:
    build:
      context: ./sklad
      dockerfile: Dockerfile
    container_name: sklad
    restart: always
    expose:
      - "3000"
    networks:
      - app-network

  postgres:
    build: ./services/postgres_db
    container_name: pg
    expose:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: always
    networks:
      - app-network
    env_file:
      - .env.docker.prod


  pgadmin:
    build:
      context: ./services/pgadmin
      dockerfile: Dockerfile
    container_name: pgadmin_eq
    restart: always
    depends_on:
      - postgres
    ports:
      - "5050:80"
    env_file:
      - .env.docker.prod
    volumes:
      - ./services/pgadmin/PGADMINDATA:/var/lib/pgadmin
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  react_build:
  db_data:
    driver: local
