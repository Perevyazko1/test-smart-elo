version: "3.8"

services:
  postgres_db:
    build: ./postgres_db
    container_name: postgres_db_eq
    restart: always
    volumes:
      - db:/var/lib/postgresql/data
    env_file:
      - .env

  django_app:
    build:
      context: ./django_app
      dockerfile: Dockerfile
    container_name: django_app_eq
    restart: always
    depends_on:
      - redis
      - postgres_db
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - product_images:/app/media/images/products
    command: >
      sh -c "python manage.py makemigrations &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  pgadmin:
    build:
      context: ./pgadmin
      dockerfile: Dockerfile
    container_name: pgadmin_eq
    restart: always
    depends_on:
      - postgres_db
    ports:
      - "5050:80"
    env_file:
      - ./.env
    volumes:
      - ./pgadmin/PGADMINDATA:/var/lib/pgadmin

  redis:
    container_name: redis_eq
    build: ./redis
    restart: always

  nginx:
    container_name: nginx_eq
    build: ./nginx
    restart: always
    depends_on:
      - django_app
    volumes:
      - ./react_app/build/:/usr/share/nginx/html
    ports:
      - "80:80"
volumes:
  db:
    driver: local
  product_images:
    driver: local