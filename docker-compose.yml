services:
  nginx:
    build:
      context: ./services/nginx
      dockerfile: Dockerfile
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
      - "8443:8443"
    volumes:
      - ./django_app/media/:/usr/share/nginx/html/media
      - ./django_app/static/:/usr/share/nginx/html/static
      - ./services/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./services/nginx/certs:/etc/nginx/certs
      - react_build:/usr/share/nginx/html/elo
      - media_data:/usr/share/nginx/html/media_server
    depends_on:
      - elo_server
      - sklad
      - elo_client_build
      - salary
    networks:
      - app-network
    restart: always

  elo_server:
    build:
      context: ./django_app
      dockerfile: Dockerfile
    container_name: elo_server
    volumes:
      - ./django_app/media/:/app/media
    env_file:
      - .env.docker.prod
    restart: unless-stopped
    expose:
      - "8000"
    networks:
      - app-network
    depends_on:
      - elo_redis
      - postgres
    command: >
      sh -c "uvicorn django_app.asgi:application --host 0.0.0.0 --port 8000 --workers 4 --limit-concurrency 1000"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  elo_redis:
    container_name: elo_redis
    build: ./services/redis
    ports:
      - "6379"
    restart: unless-stopped
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  elo_celery_worker:
    build:
      context: ./django_app
      dockerfile: Dockerfile
    container_name: elo_celery_worker
    restart: unless-stopped
    volumes:
      - ./django_app/media/:/app/media
    depends_on:
      - elo_server
    ports:
      - "58231"
    command: celery -A django_app worker -l info --concurrency=4 --max-tasks-per-child=100 --max-memory-per-child=200000
    env_file:
      - .env.docker.prod
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
  elo_celery_beat:
    build:
      context: ./django_app
      dockerfile: Dockerfile
    container_name: elo_celery_beat
    restart: unless-stopped
    depends_on:
      - elo_server
    volumes:
      - ./django_app/media/:/app/media
    ports:
      - "58232"
    command: celery -A django_app beat -l INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env.docker.prod
    networks:
      - app-network

  elo_client_build:
    build:
      context: ./new_react
      dockerfile: Dockerfile
    container_name: elo_client_build
    stdin_open: true
    tty: true
    volumes:
      - react_build:/output
    command: sh -c "cp -r /runtime/build/* /output/ && ls -la /output"
  sklad:
    build:
      context: ./sklad
      dockerfile: Dockerfile
    container_name: sklad
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - app-network
  postgres:
    build: ./services/postgres_db
    container_name: pg
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - app-network
    env_file:
      - .env.docker.prod
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    command: postgres -c max_connections=200 -c shared_buffers=256MB -c effective_cache_size=1GB -c work_mem=8MB
  pgadmin:
    build:
      context: ./services/pgadmin
      dockerfile: Dockerfile
    container_name: pgadmin_eq
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "5050:80"
    env_file:
      - .env.docker.prod
    volumes:
      - ./services/pgadmin/PGADMINDATA:/var/lib/pgadmin
    networks:
      - app-network
  salary:
    build:
      context: ./react_app
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: salary
    networks:
      - app-network
    expose:
      - "80"
    env_file:
      - .env.docker.prod
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '6'
          memory: 10G
        reservations:
          cpus: '2'
          memory: 6G

  n8n:
    image: n8nio/n8n
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    depends_on:
      - postgres
      - ollama
    networks:
      - app-network
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=postgres
      - DB_POSTGRESDB_PASSWORD=Qwerty12345
      - OLLAMA_BASE_URL=http://ollama:11434
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=X9k$mP2vL7nQ4wRj
      - N8N_SECURE_COOKIE=false
      - WEBHOOK_URL=http://159.194.203.33:5678/
      - N8N_EDITOR_BASE_URL=http://159.194.203.33:5678/
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M


networks:
  app-network:
    driver: bridge

volumes:
  react_build:
  db_data:
    driver: local
  media_data:
  ollama_data: