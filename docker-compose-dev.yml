services:
  server:
    build:
      context: ./django_app/
      dockerfile: DockerfileDev
    restart: always
    volumes:
      - ./django_app:/app
    depends_on:
      - postgres_db
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: >
      sh -c "python3 manage.py runserver 0.0.0.0:8000"

  postgres_db:
    build: services/postgres_db
    container_name: dev_postgres_db_eq
    restart: always
    volumes:
      - ./services/postgres_db/PGDATA:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    env_file:
      - .env

  pgadmin:
    build:
      context: ./services/pgadmin
      dockerfile: Dockerfile
    container_name: dev_pgadmin_eq
    restart: always
    depends_on:
      - postgres_db
    ports:
      - "5050:80"
    env_file:
      - .env
    volumes:
      - ./services/pgadmin/PGADMINDATA:/var/lib/pgadmin

  redis:
    container_name: dev_redis_eq
    build: services/redis
    restart: always
    ports:
      - "6379:6379"

  nginx:
    container_name: nginx_eq
    build: ./services/nginx
    restart: always
    volumes:
      - ./django_app/media/:/usr/share/nginx/html/media
      - ./services/nginx/nginx.dev.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
    env_file:
      - .env
