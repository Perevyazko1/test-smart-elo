services:
  server:
    build:
      context: ./django_app/
      dockerfile: DockerfileDev
    container_name: server
    restart: unless-stopped
    volumes:
      - ./django_app:/app
    depends_on:
      pg:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    ports:
    - "8000:8000"
    command: >
      sh -c "uvicorn django_app.asgi:application --reload --host 0.0.0.0 --port 8000 --log-level warning"
    networks:
      - dev-network

  pg:
    build: services/postgres_db
    container_name: pg
    restart: unless-stopped
    volumes:
      - ./services/postgres_db/PGDATA:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

    networks:
      - dev-network

  pgadmin:
    build:
      context: ./services/pgadmin
      dockerfile: Dockerfile
    container_name: pgadmin
    restart: unless-stopped
    depends_on:
      - pg
    ports:
      - "5050:80"
    env_file:
      - .env
    volumes:
      - ./services/pgadmin/PGADMINDATA:/var/lib/pgadmin
    networks:
      - dev-network

  redis:
    container_name: redis
    build: services/redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"
    networks:
      - dev-network

  nginx:
    container_name: nginx
    build: ./services/nginx
    restart: unless-stopped
    depends_on:
      - server
    volumes:
      - ./django_app/media/:/usr/share/nginx/html/media
      - ./services/nginx/nginx.dev.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
    env_file:
      - .env
    networks:
      - dev-network

  salary:
    build:
      context: ./react_app
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: salary
    ports:
      - "3001:80"
    env_file:
      - .env
    restart: unless-stopped


  celery_worker:
    build:
      context: ./django_app
      dockerfile: DockerfileDev
    container_name: celery_worker
    restart: unless-stopped
    volumes:
      - ./django_app:/app
    depends_on:
      - server
      - redis
    ports:
      - "58231"
    command: celery -A django_app worker -l info
    env_file:
      - .env
    networks:
      - dev-network

  celery_beat:
    build:
      context: ./django_app
      dockerfile: DockerfileDev
    container_name: celery_beat
    restart: unless-stopped
    depends_on:
      - server
      - redis
    volumes:
      - ./django_app:/app
    ports:
      - "58232"
    command: celery -A django_app beat -l INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env
    networks:
      - dev-network

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - prom_data:/prometheus
      - ./services/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - dev-network
    depends_on:
      - postgres_exporter

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres_exporter
    restart: unless-stopped
    environment:
      # Берём креды из вашего .env.docker.prod (или задайте вручную)
      # pg — это container_name вашего Postgres (из основного compose)
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pg:5432/${POSTGRES_DB}?sslmode=disable"
    env_file:
      - .env
    networks:
      - dev-network

  grafana:
    image: grafana/grafana:11.3.0
    container_name: grafana
    restart: unless-stopped
    environment:
      # Пароль лучше поменять после первого входа
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./services/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./services/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3002:3000"
    networks:
      - dev-network
    depends_on:
      - prometheus



networks:
  dev-network:
    driver: bridge

volumes:
  prom_data:
  grafana_data: