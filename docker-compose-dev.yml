services:
  server:
    build:
      context: ./django_app/
      dockerfile: DockerfileDev
    container_name: server
    restart: unless-stopped
    volumes:
      - ./django_app:/app
    depends_on:
      - pg
      - redis
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: >
      sh -c "uvicorn django_app.asgi:application --reload --host 0.0.0.0 --port 8000"
    networks:
      - dev-network

  pg:
    build: services/postgres_db
    container_name: pg
    restart: unless-stopped
    volumes:
      - ./services/postgres_db/PGDATA:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    env_file:
      - .env
    networks:
      - dev-network

  pgadmin:
    build:
      context: ./services/pgadmin
      dockerfile: Dockerfile
    container_name: pgadmin
    restart: unless-stopped
    depends_on:
      - pg
    ports:
      - "5050:80"
    env_file:
      - .env
    volumes:
      - ./services/pgadmin/PGADMINDATA:/var/lib/pgadmin
    networks:
      - dev-network

  redis:
    container_name: redis
    build: services/redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - dev-network

  nginx:
    container_name: nginx
    build: ./services/nginx
    restart: unless-stopped
    depends_on:
      - server
    volumes:
      - ./django_app/media/:/usr/share/nginx/html/media
      - ./services/nginx/nginx.dev.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
    env_file:
      - .env
    networks:
      - dev-network

  salary:
    build:
      context: ./react_app
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: salary
    ports:
      - "3001:80"
    env_file:
      - .env
    restart: unless-stopped

networks:
  dev-network:
    driver: bridge
